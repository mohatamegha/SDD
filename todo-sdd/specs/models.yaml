openapi: 3.0.0
components:
  schemas:
    Todo:
      type: object
      required:
        - id
        - title
        - completed
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time

